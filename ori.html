<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Master Parfum &mdash; Point of Sale</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ======================= LOADING SPLASH ======================= -->
<div id="splash" class="splash">
  <div class="splash-mark">
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
      <path d="M26 4C26 4 15 16 15 27C15 34.2 19.9 40 26 40C32.1 40 37 34.2 37 27C37 16 26 4 26 4Z" stroke="currentColor" stroke-width="2.2"/>
      <path d="M26 40V48M18 48H34" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="splash-text">Master Parfum</div>
  <div class="splash-sub" id="splashSub">Menyiapkan toko&hellip;</div>
</div>

<!-- ======================= LOGIN SCREEN ======================= -->
<div id="viewLogin" class="login-wrap hidden">
  <div class="login-atmosphere"></div>
  <form id="formLogin" class="login-card" autocomplete="off">
    <div class="login-mark">
      <svg width="40" height="40" viewBox="0 0 52 52" fill="none">
        <path d="M26 4C26 4 15 16 15 27C15 34.2 19.9 40 26 40C32.1 40 37 34.2 37 27C37 16 26 4 26 4Z" stroke="currentColor" stroke-width="2.2"/>
        <path d="M26 40V48M18 48H34" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Master Parfum</h1>
    <p class="login-tag">Masuk untuk membuka kasir hari ini</p>

    <label class="field">
      <span>Username</span>
      <input type="text" id="loginUsername" placeholder="mis. kasir1" required>
    </label>
    <label class="field">
      <span>Kata sandi</span>
      <input type="password" id="loginPassword" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
    </label>

    <button type="submit" class="btn btn-primary btn-block" id="btnLoginSubmit">Masuk</button>
    <div class="login-msg" id="loginMsg"></div>
    <div class="login-foot">Master Parfum POS &middot; tersambung ke Google Sheets</div>
  </form>
</div>

<!-- ======================= APP SHELL ======================= -->
<div id="viewApp" class="app-shell hidden">

  <!-- Sidebar (desktop) -->
  <aside class="sidebar">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 52 52" fill="none">
        <path d="M26 4C26 4 15 16 15 27C15 34.2 19.9 40 26 40C32.1 40 37 34.2 37 27C37 16 26 4 26 4Z" stroke="currentColor" stroke-width="2.6"/>
        <path d="M26 40V48M18 48H34" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
      </svg>
      <span>Master Parfum</span>
    </div>
    <nav class="nav" id="sideNav">
      <button class="nav-item" data-view="kasir">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 4h18v2H3zm2 4h14l-1.5 9.5A2 2 0 0 1 15.5 19h-7a2 2 0 0 1-2-1.7L5 8zm3.5 2.5v6h1.5v-6zm4.5 0v6h1.5v-6z"/></svg>
        <span>Kasir</span>
      </button>
      <button class="nav-item" data-view="stok">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M4 7l8-4 8 4v10l-8 4-8-4zm8-1.9L6.2 8 12 10.9 17.8 8zM6 9.7v6.6l5 2.5v-6.6zm12 0l-5 2.5v6.6l5-2.5z"/></svg>
        <span>Stok</span>
      </button>
      <button class="nav-item" data-view="matriks">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M4 4h7v7H4zm9 0h7v7h-7zM4 13h7v7H4zm9 0h7v7h-7z"/></svg>
        <span>Matriks Oplosan</span>
      </button>
      <button class="nav-item" data-view="jurnal">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M5 3h11l3 3v15H5zm10 1.5V8h3.5zM7 12h10v1.5H7zm0 4h10v1.5H7z"/></svg>
        <span>Jurnal &amp; Laporan</span>
      </button>
      <button class="nav-item" data-view="users" id="navUsers">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 12a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9zm0 2c-4.4 0-8 2.2-8 5v2h16v-2c0-2.8-3.6-5-8-5z"/></svg>
        <span>Pengguna</span>
      </button>
    </nav>
    <div class="side-user">
      <div class="side-user-name" id="sideUserName">&mdash;</div>
      <div class="side-user-role" id="sideUserRole">&mdash;</div>
      <button class="btn-logout" id="btnLogout">Keluar</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-title" id="topbarTitle">Kasir</div>
      <div class="topbar-right">
        <span class="sync-dot" id="syncDot" title="Status sinkronisasi"></span>
        <span class="sync-label" id="syncLabel">tersinkron</span>
      </div>
    </header>
    <section class="content" id="content"><!-- injected per view --></section>
  </main>

  <!-- Bottom nav (mobile/tablet) -->
  <nav class="bottomnav" id="bottomNav">
    <button class="bn-item" data-view="kasir">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 4h18v2H3zm2 4h14l-1.5 9.5A2 2 0 0 1 15.5 19h-7a2 2 0 0 1-2-1.7L5 8z"/></svg>
      <span>Kasir</span>
    </button>
    <button class="bn-item" data-view="stok">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M4 7l8-4 8 4v10l-8 4-8-4z"/></svg>
      <span>Stok</span>
    </button>
    <button class="bn-item" data-view="matriks">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M4 4h7v7H4zm9 0h7v7h-7zM4 13h7v7H4zm9 0h7v7h-7z"/></svg>
      <span>Matriks</span>
    </button>
    <button class="bn-item" data-view="jurnal">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M5 3h11l3 3v15H5z"/></svg>
      <span>Jurnal</span>
    </button>
    <button class="bn-item" data-view="more" id="bnMore">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm0 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm0 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg>
      <span>Lainnya</span>
    </button>
  </nav>
</div>

<!-- ======================= TOAST ======================= -->
<div id="toastHost" class="toast-host"></div>

<!-- ======================= MODAL HOST ======================= -->
<div id="modalHost" class="modal-host hidden">
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal-box" id="modalBox"></div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/kasir.js"></script>
<script src="js/stok.js"></script>
<script src="js/matriks.js"></script>
<script src="js/jurnal.js"></script>
<script src="js/users.js"></script>
<script src="js/app.js"></script>
</body>
</html>
